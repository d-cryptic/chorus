<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chorus — suggestion queue</title>
<style>
  :root{--bg:#000;--panel:#0c0c0d;--panel2:#141416;--border:#262628;--rule:#3a3a3d;
    --fg:#f2f2f2;--muted:#8a8a8a;--faint:#646467;--green:#7ec699;--tan:#c9b07e;--maroon:#b06a6a;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--sans);line-height:1.5}
  header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--rule);padding:16px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  header h1{font-size:16px;font-weight:800;margin:0}
  header .meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:auto;text-align:right}
  header .meta b{color:var(--green)} header .meta .warn{color:var(--tan)}
  .filters{display:flex;gap:8px;padding:12px 24px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--muted);flex-wrap:wrap}
  .filters button{font-family:var(--mono);font-size:12px;background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:3px 10px;cursor:pointer}
  .filters button.on{color:var(--green);border-color:var(--green)}
  main{max-width:920px;margin:0 auto;padding:20px 24px 80px}
  .card{border:1px solid var(--border);border-radius:6px;background:var(--panel);padding:18px 20px;margin:0 0 16px}
  .top{display:flex;align-items:baseline;gap:10px;font-family:var(--mono);font-size:12px;color:var(--muted);flex-wrap:wrap}
  .score{font-weight:700;color:var(--green);font-size:14px}
  .chip{border:1px solid var(--border);border-radius:2px;padding:0 6px;color:var(--faint)}
  .top a{color:var(--muted);border-bottom:1px solid var(--border);text-decoration:none}
  .tweet{margin:10px 0 6px;font-size:15px;color:#e9e9e9}
  .angle{font-family:var(--mono);font-size:12.5px;color:var(--tan);margin:6px 0 12px}.angle::before{content:"▸ angle: ";color:var(--faint)}
  .draft{display:flex;gap:10px;align-items:flex-start;border-top:1px solid var(--border);padding:10px 0}
  .draft p{margin:0;font-size:14px;flex:1}
  .draft .db{display:flex;gap:6px}
  .draft button,.actions button{font-family:var(--mono);font-size:11px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:3px 10px;cursor:pointer;white-space:nowrap}
  .draft button:hover{color:var(--green);border-color:var(--green)}
  .actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .actions .posted:hover{color:var(--green);border-color:var(--green)}.actions .dismiss:hover{color:var(--maroon);border-color:var(--maroon)}
  .rationale{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:10px}
  .empty,.err{font-family:var(--mono);color:var(--faint);font-size:13px;padding:40px 0;text-align:center}.err{color:var(--maroon)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--green);color:var(--green);font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:4px;opacity:0;transition:opacity .2s;pointer-events:none}.toast.show{opacity:1}
</style></head>
<body>
<header>
  <h1>Chorus · suggestion queue</h1><a href="/review" style="font-family:var(--mono);font-size:12px;color:var(--green);text-decoration:none;border-bottom:1px solid var(--border)">weekly review →</a>
  <span class="meta">spend today: <b id="spend">—</b> · <b id="count">0</b> queued<br><span id="heartbeat" class="warn">last cycle: —</span></span>
</header>
<div class="filters"><span>status:</span>
  <button class="on" data-status="queued">queued</button>
  <button data-status="posted">posted</button>
  <button data-status="dismissed">dismissed</button>
</div>
<main id="list"><div class="empty">loading…</div></main>
<div class="toast" id="toast"></div>
<script>
let status="queued";
const esc=s=>(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const toast=m=>{const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1500);};
const parse=(x,f)=>{if(x==null)return f;if(typeof x!=="string")return x;try{return JSON.parse(x);}catch{return f;}};
const store={};

async function load(){
  const list=document.getElementById("list");
  try{
    const [sg,sp,stt]=await Promise.all([
      fetch(`/api/suggestions?status=${status}`).then(r=>r.json()),
      fetch(`/api/spend`).then(r=>r.json()).catch(()=>({total:0})),
      fetch(`/api/status`).then(r=>r.json()).catch(()=>({lastRun:null})),
    ]);
    document.getElementById("spend").textContent="$"+(Number(sp.total)||0).toFixed(2);
    const lr=stt.lastRun;
    document.getElementById("heartbeat").textContent = lr&&lr.started_at
      ? `last cycle: ${Math.round((Date.now()-lr.started_at)/3600000)}h ago · ${lr.suggested??0} suggested${lr.error?" · ERROR":""}`
      : "last cycle: never — is the daily job running?";
    const items=sg.suggestions||[];
    document.getElementById("count").textContent=items.length;
    items.forEach(s=>store[s.id]=s);
    list.innerHTML=items.length?items.map(render).join(""):`<div class="empty">nothing ${esc(status)}.</div>`;
    wire();
  }catch(e){list.innerHTML=`<div class="err">failed to load — ${esc(String(e))}</div>`;}
}

function render(s){
  const f=parse(s.factors,{}),drafts=parse(s.drafts,[]);
  const age=s.created_at?Math.max(0,Math.round((Date.now()-s.created_at)/60000))+"m":"";
  const top=Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([k])=>k).join(" · ");
  const url=s.tweet_url||(s.tweet_id?`https://x.com/i/web/status/${encodeURIComponent(s.tweet_id)}`:null);
  const draftHtml=drafts.map((d,i)=>{
    const intent=`https://x.com/intent/post?text=${encodeURIComponent(d)}${s.tweet_id?`&in_reply_to=${encodeURIComponent(s.tweet_id)}`:""}`;
    return `<div class="draft"><p>${esc(d)}</p><div class="db">
      <button data-act="copy" data-id="${esc(s.id)}" data-i="${i}">copy</button>
      <a class="draft" href="${esc(intent)}" target="_blank" rel="noopener"><button>open reply ↗</button></a></div></div>`;
  }).join("");
  const acts=status==="queued"?`<div class="actions">
      <button class="posted" data-act="posted" data-id="${esc(s.id)}">✓ posted</button>
      <button data-act="posted_edited" data-id="${esc(s.id)}">✎ posted (edited)</button>
      <button data-act="snoozed" data-id="${esc(s.id)}">⏱ snooze 2h</button>
      <button class="dismiss" data-act="dismissed" data-id="${esc(s.id)}">✕ dismiss</button></div>`:"";
  return `<div class="card" id="c-${esc(s.id)}">
    <div class="top"><span class="score">${(Number(s.score)||0).toFixed(2)}</span>
      <span>@${esc(s.author_handle)}</span>${s.author_tier?`<span class="chip">tier ${esc(s.author_tier)}</span>`:""}
      ${age?`<span>${age} ago</span>`:""}${s.pillar?`<span class="chip">${esc(s.pillar)}</span>`:""}
      ${top?`<span>${esc(top)}</span>`:""}${url?`<a href="${esc(url)}" target="_blank" rel="noopener">view ↗</a>`:""}</div>
    <div class="tweet">${esc(s.tweet_text)}</div>${s.angle?`<div class="angle">${esc(s.angle)}</div>`:""}
    ${draftHtml}${s.rationale?`<div class="rationale">${esc(s.rationale)}</div>`:""}${acts}</div>`;
}

function wire(){
  document.querySelectorAll("[data-act]").forEach(b=>b.addEventListener("click",()=>handle(b.dataset)));
}
async function copyDraft(id,i){
  const d=parse(store[id]?.drafts,[])[i]??"";
  try{await navigator.clipboard.writeText(d);toast("copied — post it yourself");}catch{toast("copy failed");}
}
async function handle(ds){
  const {act,id,i}=ds;
  if(act==="copy")return copyDraft(id,Number(i));
  let body={action:act};
  if(act==="dismissed")body.reason=prompt("dismiss reason (optional — trains the ranker):")||undefined;
  if(act==="posted_edited"){const t=prompt("paste what you ACTUALLY posted (trains your voice):");if(!t)return;body.final_text=t;}
  if(act==="posted"||act==="posted_edited"){const u=prompt("paste your reply URL (optional — for outcome tracking):");if(u)body.posted_url=u;}
  try{
    await fetch(`/api/suggestions/${encodeURIComponent(id)}/action`,{method:"POST",
      headers:{"content-type":"application/json","X-Chorus":"1"},body:JSON.stringify(body)});
    document.getElementById("c-"+id)?.remove();
    document.getElementById("count").textContent=document.querySelectorAll(".card").length;
    toast(act);
  }catch{toast("action failed");}
}
document.querySelectorAll(".filters button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");status=b.dataset.status;load();});
load();
</script></body></html>
